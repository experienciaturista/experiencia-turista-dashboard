<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera — Chat de Prueba</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #161616;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #FF0093;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px rgba(255,0,147,0.4);
      flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 14px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .header-status { font-size: 11px; color: #999; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #1DB954; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .badge {
      font-size: 10px; font-weight: 600;
      background: rgba(255,0,147,0.15);
      color: #FF0093;
      padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .msg-user {
      background: #FF0093;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg-vera {
      background: #1f1f1f;
      color: #f0f0f0;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .msg-system {
      background: rgba(81,181,224,0.1);
      color: #51B5E0;
      align-self: center;
      font-size: 11px;
      text-align: center;
      border-radius: 20px;
      padding: 6px 14px;
    }
    .typing {
      background: #1f1f1f;
      border: 1px solid rgba(255,255,255,0.07);
      align-self: flex-start;
      padding: 14px 18px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: none;
    }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    .input-area {
      background: #161616;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      background: #1f1f1f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: #f0f0f0;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #FF0093; }
    textarea::placeholder { color: #555; }
    button {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: #FF0093;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 0 12px rgba(255,0,147,0.3);
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button svg { width: 18px; height: 18px; fill: white; }
    .suggestions {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .suggestion {
      font-size: 11px;
      font-family: 'Montserrat', sans-serif;
      background: #1f1f1f;
      border: 1px solid rgba(255,0,147,0.3);
      color: #FF0093;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .suggestion:hover { background: rgba(255,0,147,0.1); }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🏔️</div>
    <div class="header-info">
      <div class="header-name">Vera</div>
      <div class="header-status"><span class="dot"></span>Experiencia Turista · Modo prueba</div>
    </div>
    <div class="badge">⚡ Test</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg msg-system">Modo de prueba — los mensajes no llegan a turistas reales</div>
    <div class="msg msg-vera">¡Hola! 👋 Soy Vera de Experiencia Turista. ¿Con quién tengo el gusto?</div>
  </div>

  <div class="typing" id="typing">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="enviarSugerencia(this)">Quiero ir a Las Leñas</button>
    <button class="suggestion" onclick="enviarSugerencia(this)">¿Va a haber nieve?</button>
    <button class="suggestion" onclick="enviarSugerencia(this)">Somos 4 personas</button>
    <button class="suggestion" onclick="enviarSugerencia(this)">¿Cuánto sale el Cañón del Atuel?</button>
    <button class="suggestion" onclick="enviarSugerencia(this)">¿Cómo reservo?</button>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      placeholder="Escribile a Vera..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="sendBtn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const BOT_URL = "https://experiencia-turista-bot-production.up.railway.app/test";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const typingEl = document.getElementById("typing");
    const suggestionsEl = document.getElementById("suggestions");
    let sessionId = "test-" + Date.now();

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 120) + "px";
    }

    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        enviar();
      }
    }

    function agregarMensaje(texto, tipo) {
      const div = document.createElement("div");
      div.className = `msg msg-${tipo}`;
      div.textContent = texto;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function mostrarTyping() {
      typingEl.style.display = "block";
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function ocultarTyping() {
      typingEl.style.display = "none";
    }

    function enviarSugerencia(btn) {
      inputEl.value = btn.textContent;
      suggestionsEl.style.display = "none";
      enviar();
    }

    async function enviar() {
      const texto = inputEl.value.trim();
      if (!texto) return;

      suggestionsEl.style.display = "none";
      agregarMensaje(texto, "user");
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      mostrarTyping();

      try {
        const res = await fetch(BOT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje: texto, telefono: sessionId }),
        });

        const data = await res.json();
        ocultarTyping();

        if (data.respuesta) {
          agregarMensaje(data.respuesta, "vera");
        } else {
          agregarMensaje("Hubo un error. Intentá de nuevo.", "system");
        }
      } catch (err) {
        ocultarTyping();
        agregarMensaje("No se pudo conectar con Vera. Verificá que el servidor esté activo.", "system");
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>

</body>
</html>
